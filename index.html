<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcos 2031</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
  :root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:#222;--accent:#c8f060;--accent2:#f0a030;--text:#f0ede8;--muted:#666;--user-bg:#1c2010;--ai-bg:#111}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .header-left{display:flex;align-items:center;gap:10px}
  .logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#0a0a0a}
  .header-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
  .header-sub{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
  .status-dot{width:7px;height:7px;border-radius:50%;background:#666;transition:background .3s}
  .status-dot.online{background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,240,96,.4)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(200,240,96,0)}}
  .server-bar{background:#1a1200;border-bottom:1px solid #443300;padding:8px 18px;font-size:10px;color:var(--accent2);display:flex;align-items:center;gap:8px;flex-shrink:0}
  .server-bar input{background:var(--surface);border:1px solid #443300;border-radius:4px;padding:4px 8px;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;outline:none;flex:1}
  .server-bar input:focus{border-color:var(--accent)}
  .server-bar button{background:var(--accent2);color:#0a0a0a;border:none;border-radius:4px;padding:4px 10px;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;cursor:pointer;text-transform:uppercase;white-space:nowrap}
  .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
  .messages::-webkit-scrollbar{width:3px}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:30px 16px;gap:12px}
  .welcome-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:6px}
  .welcome h2{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;line-height:1.2}
  .welcome p{font-size:11px;color:var(--muted);max-width:260px;line-height:1.6}
  .quick-prompts{display:flex;flex-direction:column;gap:7px;width:100%;max-width:300px;margin-top:6px}
  .quick-prompt{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;text-align:left;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;line-height:1.4}
  .quick-prompt:hover{border-color:var(--accent);color:var(--accent)}
  .quick-prompt-label{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:2px}
  .message{display:flex;flex-direction:column;gap:5px;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-items:flex-end}
  .message.assistant{align-items:flex-start}
  .message-meta{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 3px}
  .message.user .message-meta{color:var(--accent);opacity:.7}
  .bubble{max-width:88%;padding:10px 14px;border-radius:10px;font-size:12px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
  .message.user .bubble{background:var(--user-bg);border:1px solid rgba(200,240,96,.2);border-bottom-right-radius:2px}
  .message.assistant .bubble{background:var(--ai-bg);border:1px solid var(--border);border-bottom-left-radius:2px}
  .bubble strong{color:var(--accent)}
  .sources{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .source-chip{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:2px 7px;font-size:8px;color:var(--muted)}
  .thinking{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--ai-bg);border:1px solid var(--border);border-radius:10px;border-bottom-left-radius:2px;max-width:220px}
  .thinking-dots{display:flex;gap:3px}
  .thinking-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite}
  .thinking-dot:nth-child(2){animation-delay:.2s}.thinking-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
  .thinking-text{font-size:9px;color:var(--muted)}
  .input-area{padding:14px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .input-row{display:flex;gap:8px;align-items:flex-end}
  .input-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;overflow:hidden}
  .input-wrap:focus-within{border-color:var(--accent)}
  #userInput{width:100%;background:transparent;border:none;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;resize:none;max-height:100px;line-height:1.5}
  #userInput::placeholder{color:var(--muted)}
  .send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .send-btn:disabled{opacity:.3;cursor:not-allowed}
  .send-btn svg{width:16px;height:16px;fill:#0a0a0a}
  .input-hint{font-size:8px;color:var(--muted);margin-top:7px;text-align:center}
  .error-bubble{background:#1a0a0a;border:1px solid #440000;border-radius:7px;padding:9px 12px;font-size:10px;color:#ff6060;max-width:88%}
  .debug{font-size:9px;color:#555;padding:2px 4px;text-align:center;font-family:'DM Mono',monospace}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">M</div>
    <div>
      <div class="header-title">Marcos 2031</div>
      <div class="header-sub">WSG Second Brain</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText" style="font-size:9px;color:var(--muted)">connecting...</span>
  </div>
</div>

<div class="server-bar" id="serverBar">
  <span>🖥 Server:</span>
  <input type="text" id="serverUrl" value="http://100.81.241.17:8765" />
  <button onclick="checkServer()">Connect</button>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🦞</div>
    <h2>Marcos 2031<br>is ready.</h2>
    <p>4,984 files indexed. Ask anything. Real data, zero hallucination.</p>
    <div class="quick-prompts">
      <button class="quick-prompt" onclick="sendQuick('What do I know about Duro-Last roofing specs and warranties?')"><div class="quick-prompt-label">🏗 Roofing</div>Duro-Last specs & warranties</button>
      <button class="quick-prompt" onclick="sendQuick('What real estate leads are in my pipeline right now?')"><div class="quick-prompt-label">🏠 Real Estate</div>What leads are in my pipeline?</button>
      <button class="quick-prompt" onclick="sendQuick('What is my current cash position and financial status?')"><div class="quick-prompt-label">💰 Finance</div>Current cash position?</button>
      <button class="quick-prompt" onclick="sendQuick('What are my top 3 priorities right now based on my data?')"><div class="quick-prompt-label">🎯 Strategy</div>Top 3 priorities right now?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <div class="input-wrap"><textarea id="userInput" rows="1" placeholder="Ask Marcos anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea></div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
  <div class="input-hint">Powered by your PC · Pinecone brain1 · 4,984 files</div>
</div>

<script>
let serverUrl = localStorage.getItem('marcos_server') || 'http://100.81.241.17:8765';
let messages = [], isThinking = false;

document.getElementById('serverUrl').value = serverUrl;

async function checkServer() {
  serverUrl = document.getElementById('serverUrl').value.trim();
  localStorage.setItem('marcos_server', serverUrl);
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const res = await fetch(serverUrl, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question:'ping', history:[]}) });
    dot.className = 'status-dot online';
    txt.textContent = 'online';
    txt.style.color = 'var(--accent)';
    document.getElementById('serverBar').style.background = '#0a1a00';
    document.getElementById('serverBar').style.borderColor = '#1a4400';
  } catch(e) {
    dot.className = 'status-dot';
    txt.textContent = 'offline — start marcos_server.py on PC';
    txt.style.color = '#ff6060';
  }
}

async function sendMessage() {
  if (isThinking) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  isThinking = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = ''; input.style.height = 'auto';

  hideWelcome();
  addMessage('user', text);
  messages.push({role:'user', content:text});
  showThinking();

  try {
    document.querySelector('#thinkingMsg .thinking-text').textContent = 'Searching Second Brain...';
    const res = await fetch(serverUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: text, history: messages.slice(-10,-1)})
    });
    const data = await res.json();
    hideThinking();
    if (data.chunks > 0) addDebug(`🔍 ${data.chunks} chunks found`);
    addMessage('assistant', data.answer, data.sources || []);
    messages.push({role:'assistant', content:data.answer});
    if (messages.length > 20) messages = messages.slice(-20);
  } catch(e) {
    hideThinking();
    addError('Cannot reach server. Make sure marcos_server.py is running on your PC and Tailscale is connected.');
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function hideWelcome(){const w=document.getElementById('welcome');if(w)w.remove()}
function addDebug(msg){const d=document.createElement('div');d.className='debug';d.textContent=msg;const c=document.getElementById('messages');c.appendChild(d);c.scrollTop=c.scrollHeight}
function addError(msg){const d=document.createElement('div');d.className='message assistant';d.innerHTML='<div class="error-bubble">⚠ '+msg+'</div>';const c=document.getElementById('messages');c.appendChild(d);c.scrollTop=c.scrollHeight}

function addMessage(role, content, sources=[]) {
  const c = document.getElementById('messages');
  const div = document.createElement('div'); div.className='message '+role;
  const meta = document.createElement('div'); meta.className='message-meta'; meta.textContent=role==='user'?'You':'Marcos 2031';
  const bubble = document.createElement('div'); bubble.className='bubble';
  bubble.innerHTML = content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  div.appendChild(meta); div.appendChild(bubble);
  if (sources.length) {
    const sd=document.createElement('div');sd.className='sources';
    sources.forEach(s=>{const ch=document.createElement('div');ch.className='source-chip';ch.textContent='📄 '+(s.split('\\').pop().split('/').pop()||s);sd.appendChild(ch);});
    div.appendChild(sd);
  }
  c.appendChild(div); c.scrollTop=c.scrollHeight;
}

function showThinking(){
  hideWelcome();
  const c=document.getElementById('messages');
  const div=document.createElement('div');div.className='message assistant';div.id='thinkingMsg';
  div.innerHTML='<div class="message-meta">Marcos 2031</div><div class="thinking"><div class="thinking-dots"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div><div class="thinking-text">Thinking...</div></div>';
  c.appendChild(div);c.scrollTop=c.scrollHeight;
}
function hideThinking(){const el=document.getElementById('thinkingMsg');if(el)el.remove()}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function sendQuick(t){document.getElementById('userInput').value=t;sendMessage()}

// Auto-check server on load
checkServer();
</script>
</body>
</html>
